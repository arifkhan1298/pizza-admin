<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup — Pizzi Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Nunito',sans-serif; min-height:100vh;
            background:
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://images.pexels.com/photos/905847/pexels-photo-905847.jpeg?auto=compress&cs=tinysrgb&w=1200') center/cover no-repeat;
            display:flex; align-items:center; justify-content:center; padding:1rem;
        }
        .card{background:#fff;border-radius:12px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 10px 30px rgba(0,0,0,0.2);}
        .logo{text-align:center;margin-bottom:1.5rem;}
        .logo-icon{font-size:3rem;}
        .logo-title{font-family:'Nunito',sans-serif;font-size:1.8rem;font-weight:800;color:#1d3557;margin-top:0.5rem;}
        .logo-title span{color:#e63946;}
        h2{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.5rem;color:#1d3557;margin-bottom:0.25rem;text-align:center;}
        .sub{text-align:center;color:#666;font-size:0.9rem;margin-bottom:1.5rem;}
        .form-group{margin-bottom:1.1rem;}
        label{display:block;font-weight:700;font-size:0.88rem;color:#444;margin-bottom:0.4rem;}
        input{width:100%;padding:0.9rem 1rem;border:1px solid #ccc;border-radius:8px;font-size:1rem;font-family:'Nunito',sans-serif;color:#333;background:#fff;transition:border 0.2s;}
        input:focus{outline:none;border-color:#e63946;}
        .btn-main{width:100%;padding:1rem;background:#e63946;color:#fff;border:none;border-radius:8px;font-weight:800;font-size:1rem;cursor:pointer;transition:background 0.2s,transform 0.15s;margin-top:0.5rem;}
        .btn-main:hover{background:#d62828;}
        .links{text-align:center;margin-top:1.5rem;color:#666;font-size:0.9rem;}
        .links a{color:#e63946;font-weight:700;text-decoration:none;}
        .links a:hover{text-decoration:underline;}
        .back-home{display:block;text-align:center;margin-top:1rem;color:#666;font-size:0.85rem;text-decoration:none;}
        .back-home:hover{color:#e63946;}
        .benefits{background:#f8f9fa;border:1px solid #eee;border-radius:8px;padding:0.9rem;margin-bottom:1.5rem;}
        .benefits p{font-size:0.85rem;color:#e63946;font-weight:700;margin:0.2rem 0;}

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem 1rem;
            }
            .logo-title {
                font-size: 1.5rem;
            }
            h2 {
                font-size: 1.3rem;
            }
            .sub {
                font-size: 0.85rem;
                margin-bottom: 1.5rem;
            }
            input {
                padding: 0.7rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">🍕</div>
        <div class="logo-title">Pizzi<span>Shop</span></div>
    </div>
    <h2>Create New Account</h2>
    <p class="sub">Sign up once, get thousands of benefits</p>
    <div class="benefits">
        <p>✅ 10% discount on every order</p>
        <p>✅ Track your order history</p>
        <p>✅ Fast checkout experience</p>
    </div>
    <form id="signupForm">
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="name" placeholder="e.g., Ahmed Khan" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn-main">🚀 Create Account</button>
    </form>
    <div class="links">Already have an account? <a href="login.html">Login</a></div>
    <a class="back-home" href="pizzi_shop.html">← Back to Home</a>
</div>
<script>
document.getElementById('signupForm').addEventListener('submit',function(e){
    e.preventDefault();
    const name=document.getElementById('name').value.trim();
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    if(password.length<6){alert('Password must be at least 6 characters long!');return;}
    const users=JSON.parse(localStorage.getItem('users')||'[]');
    if(users.find(u=>u.email===email)){alert('This email is already registered. Please login!');return;}
    users.push({name,email,password});
    localStorage.setItem('users',JSON.stringify(users));
    alert('✅ Account created! Login now and enjoy your 10% discount!');
    window.location.href='login.html';
});
</script>
</body>
</html>
